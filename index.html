<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Scheldepunt — Guest Guide</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

<style>
  :root {
    /* Palette — Warm Editorial (default) */
    --cream: #F2EADB;
    --cream-soft: #EAE0CB;
    --cream-deep: #E2D5B8;
    --ink: #1F1814;
    --ink-soft: #4A3F37;
    --ink-mute: #8A7B6E;
    --rule: #D6C8AE;
    --terra: #B84A2C;
    --terra-deep: #8E3318;
    --moss: #3B4E33;
    --moss-deep: #28361F;
    --paper: #FBF6EB;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    /* Subtle paper grain on desktop */
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(184,74,44,0.04), transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(59,78,51,0.05), transparent 60%);
  }

  /* Phone-shaped centered container on desktop, full-bleed on mobile */
  .stage {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: stretch;
  }
  .device {
    width: 100%;
    max-width: 440px;
    background: var(--paper);
    position: relative;
    min-height: 100vh;
    overflow-x: hidden;
    box-shadow: 0 30px 80px -30px rgba(31,24,20,0.35), 0 0 0 1px rgba(31,24,20,0.04);
  }
  @media (min-width: 720px) {
    .stage { padding: 24px 0; align-items: flex-start; }
    .device {
      min-height: calc(100vh - 48px);
      border-radius: 28px;
      overflow: hidden;
    }
  }

  /* Typography utilities */
  .serif { font-family: 'Newsreader', 'EB Garamond', Georgia, serif; font-weight: 500; letter-spacing: -0.01em; }
  .serif-i { font-family: 'Newsreader', 'EB Garamond', Georgia, serif; font-style: italic; font-weight: 500; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  .eyebrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    font-weight: 500;
  }
  .rule {
    height: 1px;
    background: var(--rule);
    border: 0;
    margin: 0;
  }
  .rule-thick {
    height: 1px;
    background: var(--ink);
    border: 0;
    margin: 0;
  }

  /* Buttons / shared */
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; }

  /* Image slot defaults inside device */
  image-slot {
    --is-bg: rgba(31,24,20,0.04);
    --is-border: rgba(31,24,20,0.12);
    --is-fg: var(--ink-mute);
  }

  /* Scrollbar polish */
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

  /* Chat input fix */
  textarea, input { font-family: inherit; }

  /* Reduce motion for safety */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="image-slot.js"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="chat.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
